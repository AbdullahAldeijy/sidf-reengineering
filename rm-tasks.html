<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مهامي - SIDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f7f9fb;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 30 L15 45 L30 30 L45 15 L60 30' fill='none' stroke='%23e5e7eb' stroke-width='0.5'/%3E%3C/svg%3E");
        }
        .active-sidebar-item {
            color: #28a745;
            background-color: #f0fdf4;
            border-right: 4px solid #28a745;
        }
        .scroll-hide::-webkit-scrollbar { display: none; }

        .file-mrd { background:#dbeafe; color:#1e40af; }
        .file-ftr { background:#fed7aa; color:#9a3412; }
        .file-fmr { background:#dcfce7; color:#166534; }
        .file-own { background:#ede9fe; color:#5b21b6; }
        .file-per { background:#fef3c7; color:#854d0e; }
        .file-rsk { background:#fee2e2; color:#991b1b; }
        .file-crm { background:#cffafe; color:#155e75; }

        .file-row { transition: all 0.2s; }
        .file-row.drag-over { background-color:#eef2ff; border-color:#6366f1 !important; }
        .submitted-card { opacity: 0.65; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-right">

    <button onclick="toggleSidebar()" class="md:hidden fixed top-3 right-3 z-50 bg-white border border-gray-200 rounded-lg p-2 shadow-md">
        <i data-lucide="menu" class="w-5 h-5 text-[#002d5d]"></i>
    </button>
    <div id="sidebar-backdrop" onclick="toggleSidebar()" class="md:hidden fixed inset-0 bg-black/40 z-30 hidden"></div>

    <aside id="sidebar" class="w-24 bg-white border-l border-gray-200 flex flex-col items-center py-6 shrink-0 shadow-sm fixed md:static right-0 top-0 h-full z-40 transform translate-x-full md:translate-x-0 transition-transform">
        <div class="mb-10 text-center">
            <img src="images/SIDF_menu_logo.png" alt="Logo" class="w-12 h-12 object-contain mb-1 cursor-pointer" onclick="window.location.href='rm.html'">
            <span class="text-[10px] text-gray-300 font-sans block">v2.0.5</span>
        </div>

        <nav class="w-full flex flex-col gap-1">
            <a href="rm.html" class="flex flex-col items-center py-4 gap-1 text-[11px] text-gray-400 hover:bg-gray-50 transition-all">
                <i data-lucide="layout-dashboard" class="w-6 h-6"></i>
                <span>الرئيسية</span>
            </a>
            <a href="rm-workload.html" class="flex flex-col items-center py-4 gap-1 text-[11px] text-gray-400 hover:bg-gray-50 transition-all">
                <i data-lucide="split" class="w-6 h-6"></i>
                <span>التوزيع</span>
            </a>
            <a href="rm-tasks.html" class="active-sidebar-item flex flex-col items-center py-4 gap-1 text-[11px] font-bold">
                <i data-lucide="clipboard-check" class="w-6 h-6"></i>
                <span>مهام</span>
            </a>
            <a href="rm-chats.html" class="flex flex-col items-center py-4 gap-1 text-[11px] text-gray-400 hover:bg-gray-50 transition-all">
                <i data-lucide="messages-square" class="w-6 h-6"></i>
                <span>المحادثات</span>
            </a>
            <a href="index.html" class="flex flex-col items-center py-4 mt-10 gap-1 text-[11px] text-red-300 hover:text-red-500 transition-all">
                <i data-lucide="log-out" class="w-6 h-6"></i>
                <span>خروج</span>
            </a>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col overflow-hidden">

        <header class="bg-white h-16 border-b border-gray-100 flex items-center justify-between px-4 md:px-8 z-10 shadow-sm gap-2">
            <div class="flex items-center gap-2 md:gap-4 min-w-0 pr-12 md:pr-0">
                <h1 class="text-[#002d5d] font-bold text-base md:text-lg truncate">مهامي</h1>
                <span class="hidden md:inline text-xs text-gray-400 bg-gray-50 px-3 py-1 rounded-full">أكمل الملفات المطلوبة وأرسلها إلى لجنة الاعتماد</span>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                    <span id="overall-progress-label" class="text-xs text-gray-500 font-bold hidden md:inline">0/0 مكتمل</span>
                    <div class="bg-green-600 rounded-full p-2 text-white shadow-sm"><i data-lucide="user-cog" class="w-5 h-5"></i></div>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 md:p-6 space-y-4 scroll-hide">

            <!-- Stats summary -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-3 flex items-center gap-3">
                    <div class="bg-blue-50 p-2 rounded-lg"><i data-lucide="briefcase" class="w-5 h-5 text-blue-600"></i></div>
                    <div>
                        <div id="stat-total" class="text-lg font-bold text-[#002d5d]">0</div>
                        <div class="text-[10px] text-gray-500">إجمالي الطلبات</div>
                    </div>
                </div>
                <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-3 flex items-center gap-3">
                    <div class="bg-orange-50 p-2 rounded-lg"><i data-lucide="clock" class="w-5 h-5 text-orange-500"></i></div>
                    <div>
                        <div id="stat-pending" class="text-lg font-bold text-[#002d5d]">0</div>
                        <div class="text-[10px] text-gray-500">قيد الإكمال</div>
                    </div>
                </div>
                <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-3 flex items-center gap-3">
                    <div class="bg-green-50 p-2 rounded-lg"><i data-lucide="check-circle" class="w-5 h-5 text-green-600"></i></div>
                    <div>
                        <div id="stat-ready" class="text-lg font-bold text-[#002d5d]">0</div>
                        <div class="text-[10px] text-gray-500">جاهزة للإرسال</div>
                    </div>
                </div>
                <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-3 flex items-center gap-3">
                    <div class="bg-purple-50 p-2 rounded-lg"><i data-lucide="send" class="w-5 h-5 text-purple-600"></i></div>
                    <div>
                        <div id="stat-submitted" class="text-lg font-bold text-[#002d5d]">0</div>
                        <div class="text-[10px] text-gray-500">مُرسلة للجنة</div>
                    </div>
                </div>
            </div>

            <!-- Tasks list -->
            <div id="tasks-container" class="grid grid-cols-1 lg:grid-cols-2 gap-4"></div>

            <!-- Project Detail Modal -->
            <div id="project-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
                <div class="bg-white rounded-2xl shadow-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
                    <div class="p-5 border-b border-gray-100 flex items-center justify-between sticky top-0 bg-white z-10">
                        <div class="flex items-center gap-3">
                            <div class="bg-[#28a745]/10 p-2 rounded-lg"><i data-lucide="briefcase" class="w-5 h-5 text-[#28a745]"></i></div>
                            <div>
                                <h3 id="modal-title" class="text-[#002d5d] font-bold text-base">—</h3>
                                <p id="modal-subtitle" class="text-xs text-gray-500">—</p>
                            </div>
                        </div>
                        <button onclick="closeProjectModal()" class="text-gray-400 hover:text-red-500 p-2"><i data-lucide="x" class="w-5 h-5"></i></button>
                    </div>
                    <div id="modal-body" class="p-6"></div>
                </div>
            </div>

        </main>
    </div>

    <script>
        lucide.createIcons();

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('translate-x-full');
            document.getElementById('sidebar-backdrop').classList.toggle('hidden');
        }

        const fileTypes = {
            MRD: { name: 'MRD', label: 'تقرير دراسة السوق',         icon: 'bar-chart-3',   cls: 'file-mrd' },
            FTR: { name: 'FTR', label: 'تقرير الدراسة الفنية',       icon: 'settings-2',    cls: 'file-ftr' },
            FMR: { name: 'FMR', label: 'تقرير المخاطر المالية',      icon: 'shield-alert',  cls: 'file-fmr' },
            OWN: { name: 'Ownership', label: 'تقرير الملكية',         icon: 'user-check',    cls: 'file-own' },
            PER: { name: 'PER', label: 'تقرير تقييم الأداء',         icon: 'gauge',         cls: 'file-per' },
            RSK: { name: 'Risk', label: 'تقييم المخاطر',             icon: 'alert-octagon', cls: 'file-rsk' },
            CRM: { name: 'CRM', label: 'نموذج المخاطر الائتمانية',   icon: 'line-chart',    cls: 'file-crm' }
        };

        const projectMeta = {
            'RQ-2024-321': { name: 'شركة التطوير العقاري',     sector: 'الطاقة المتجددة',           amount: '25,000,000', owner: 'عبدالله السعيد', city: 'الرياض', phase: 2, risk: 'low' },
            'RQ-2024-772': { name: 'مجموعة النفط الوطنية',     sector: 'النفط والغاز',              amount: '60,000,000', owner: 'فهد منصور',     city: 'الدمام', phase: 2, risk: 'high' },
            'RQ-2024-815': { name: 'مصنع البتروكيماويات',      sector: 'البتروكيماويات',            amount: '45,500,000', owner: 'خالد العمري',  city: 'الجبيل', phase: 3, risk: 'medium' },
            'RQ-2024-901': { name: 'شركة الذكاء الاصطناعي',    sector: 'التقنية والذكاء الاصطناعي', amount: '12,500,000', owner: 'ريم عبدالله',  city: 'الرياض', phase: 5, risk: 'low' },
            'RQ-2024-678': { name: 'شركة النقل اللوجستي',      sector: 'النقل واللوجستيات',         amount: '32,000,000', owner: 'يوسف الحربي',  city: 'الرياض', phase: 4, risk: 'medium' }
        };
        const phaseLabels = ['Loan Application','Evaluation','Approval','Signing','Disbursement','Loan Closing'];

        // Each task = an order assigned to this RM with its required files
        const tasks = [
            {
                id: 'RQ-2024-321',
                files: [
                    { type: 'MRD', uploaded: true,  fileName: 'market_research_v3.pdf', size: '2.3 MB', uploadedAt: 'قبل ساعتين' }
                ],
                submitted: false
            },
            {
                id: 'RQ-2024-815',
                files: [
                    { type: 'FTR', uploaded: false },
                    { type: 'FMR', uploaded: true, fileName: 'financial_risk_2024.pdf', size: '1.8 MB', uploadedAt: 'أمس' }
                ],
                submitted: false
            },
            {
                id: 'RQ-2024-772',
                files: [
                    { type: 'MRD', uploaded: false },
                    { type: 'FTR', uploaded: false },
                    { type: 'RSK', uploaded: false }
                ],
                submitted: false
            },
            {
                id: 'RQ-2024-901',
                files: [
                    { type: 'PER', uploaded: true, fileName: 'performance_eval.pdf', size: '950 KB', uploadedAt: 'قبل 3 أيام' },
                    { type: 'CRM', uploaded: true, fileName: 'crm_model.xlsx',       size: '1.2 MB', uploadedAt: 'قبل 3 أيام' }
                ],
                submitted: true,
                submittedAt: 'قبل يومين'
            },
            {
                id: 'RQ-2024-678',
                files: [
                    { type: 'OWN', uploaded: false }
                ],
                submitted: false
            }
        ];

        function modalRiskBadge(risk) {
            const map = { low: { cls: 'bg-green-50 text-green-700', icon: 'shield-check', label: 'منخفض' }, medium: { cls: 'bg-orange-50 text-orange-700', icon: 'shield-alert', label: 'متوسط' }, high: { cls: 'bg-red-50 text-red-700', icon: 'shield-x', label: 'عالي' } };
            const m = map[risk];
            return `<span class="${m.cls} inline-flex items-center gap-1 px-2 py-1 rounded-full text-[10px] font-bold"><i data-lucide="${m.icon}" class="w-3 h-3"></i>${m.label}</span>`;
        }

        function openProjectModal(id) {
            const o = Object.assign({ id }, projectMeta[id] || { name: id, sector: '—', amount: '—', owner: '—', city: '—', phase: 1, risk: 'low' });
            document.getElementById('modal-title').textContent = `${o.id} — ${o.name}`;
            document.getElementById('modal-subtitle').textContent = `${o.sector} · ${o.city} · ${o.amount} ر.س`;
            const phaseDots = phaseLabels.map((lbl, i) => {
                const idx = i + 1;
                const cls = idx < o.phase ? 'bg-[#28a745] text-white' : (idx === o.phase ? 'bg-orange-50 border-2 border-orange-400 text-orange-500' : 'bg-gray-100 text-gray-400');
                return `<div class="flex flex-col items-center gap-1 flex-1"><div class="w-8 h-8 rounded-full flex items-center justify-center text-[11px] font-bold ${cls}">${idx < o.phase ? '✓' : idx}</div><span class="text-[9px] font-bold text-gray-500 text-center">${lbl}</span></div>`;
            }).join('');
            document.getElementById('modal-body').innerHTML = `
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
                    <div class="bg-gray-50 rounded-lg p-3 text-right"><div class="text-[10px] text-gray-400 font-bold mb-1">رقم الطلب</div><div class="text-sm font-bold text-[#002d5d]">${o.id}</div></div>
                    <div class="bg-gray-50 rounded-lg p-3 text-right"><div class="text-[10px] text-gray-400 font-bold mb-1">القطاع</div><div class="text-sm font-bold text-[#002d5d]">${o.sector}</div></div>
                    <div class="bg-gray-50 rounded-lg p-3 text-right"><div class="text-[10px] text-gray-400 font-bold mb-1">المبلغ</div><div class="text-sm font-bold text-[#28a745]">${o.amount} ر.س</div></div>
                    <div class="bg-gray-50 rounded-lg p-3 text-right"><div class="text-[10px] text-gray-400 font-bold mb-1">المدينة</div><div class="text-sm font-bold text-[#002d5d]">${o.city}</div></div>
                </div>
                <div class="mb-6"><div class="text-xs font-bold text-[#002d5d] mb-3 flex items-center gap-2"><i data-lucide="git-branch" class="w-4 h-4 text-[#28a745]"></i> مراحل الطلب</div><div class="overflow-x-auto -mx-1 px-1"><div class="flex items-start gap-2" style="min-width:440px">${phaseDots}</div></div></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="border border-gray-100 rounded-lg p-4"><div class="text-xs font-bold text-[#002d5d] mb-2 flex items-center gap-2"><i data-lucide="user" class="w-4 h-4 text-[#28a745]"></i> المالك</div><div class="text-xs text-gray-600">${o.owner}</div><div class="text-[10px] text-gray-400 mt-1">نسبة الملكية: 100%</div></div>
                    <div class="border border-gray-100 rounded-lg p-4"><div class="text-xs font-bold text-[#002d5d] mb-2 flex items-center gap-2"><i data-lucide="shield" class="w-4 h-4 text-[#28a745]"></i> تقييم المخاطر</div>${modalRiskBadge(o.risk)}</div>
                </div>
                <div class="flex justify-end items-center pt-4 mt-4 border-t border-gray-100"><button onclick="closeProjectModal()" class="bg-white border border-gray-200 text-gray-600 px-5 py-2 rounded-lg text-xs font-bold hover:bg-gray-50">إغلاق</button></div>`;
            document.getElementById('project-modal').classList.remove('hidden');
            lucide.createIcons();
        }
        function closeProjectModal() { document.getElementById('project-modal').classList.add('hidden'); }
        document.getElementById('project-modal').addEventListener('click', function(e) { if (e.target === this) closeProjectModal(); });

        function updateStats() {
            const total = tasks.length;
            const submitted = tasks.filter(t => t.submitted).length;
            const ready = tasks.filter(t => !t.submitted && t.files.length > 0 && t.files.every(f => f.uploaded)).length;
            const pending = total - submitted - ready;
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-pending').textContent = pending;
            document.getElementById('stat-ready').textContent = ready;
            document.getElementById('stat-submitted').textContent = submitted;
            document.getElementById('overall-progress-label').textContent = `${submitted}/${total} مُرسل`;
        }

        function renderTasks() {
            const wrap = document.getElementById('tasks-container');
            wrap.innerHTML = '';
            if (tasks.length === 0) {
                wrap.innerHTML = `<div class="col-span-full bg-white rounded-2xl border border-gray-100 shadow-sm p-12 text-center text-gray-400">
                    <i data-lucide="inbox" class="w-12 h-12 mx-auto mb-3"></i>
                    <p class="text-sm">لا توجد مهام مسندة لك حالياً</p>
                </div>`;
                lucide.createIcons();
                return;
            }
            tasks.forEach((t, idx) => {
                const meta = projectMeta[t.id] || { name: t.id, sector: '—', amount: '—', city: '—' };
                const totalFiles = t.files.length;
                const uploadedFiles = t.files.filter(f => f.uploaded).length;
                const allUploaded = totalFiles > 0 && uploadedFiles === totalFiles;
                const progress = totalFiles > 0 ? Math.round((uploadedFiles / totalFiles) * 100) : 0;

                let statusBadge;
                if (t.submitted) {
                    statusBadge = `<span class="bg-purple-100 text-purple-700 text-[10px] px-2 py-1 rounded-full font-bold flex items-center gap-1"><i data-lucide="send" class="w-3 h-3"></i>تم الإرسال</span>`;
                } else if (allUploaded) {
                    statusBadge = `<span class="bg-green-100 text-green-700 text-[10px] px-2 py-1 rounded-full font-bold flex items-center gap-1"><i data-lucide="check-circle" class="w-3 h-3"></i>جاهز للإرسال</span>`;
                } else if (totalFiles === 0) {
                    statusBadge = `<span class="bg-gray-100 text-gray-500 text-[10px] px-2 py-1 rounded-full font-bold flex items-center gap-1"><i data-lucide="file-question" class="w-3 h-3"></i>لا توجد ملفات مطلوبة</span>`;
                } else {
                    statusBadge = `<span class="bg-orange-100 text-orange-700 text-[10px] px-2 py-1 rounded-full font-bold flex items-center gap-1"><i data-lucide="clock" class="w-3 h-3"></i>قيد الإكمال ${uploadedFiles}/${totalFiles}</span>`;
                }

                const filesHtml = t.files.length === 0
                    ? `<div class="text-center text-gray-400 text-xs italic py-4">لم يتم تحديد ملفات مطلوبة بعد</div>`
                    : t.files.map((f, fi) => {
                        const ft = fileTypes[f.type];
                        if (f.uploaded) {
                            return `<div class="border border-green-200 bg-green-50/50 rounded-lg p-2.5 flex items-center justify-between gap-2">
                                <div class="flex items-center gap-2 min-w-0">
                                    <div class="${ft.cls} p-1.5 rounded shrink-0"><i data-lucide="${ft.icon}" class="w-3.5 h-3.5"></i></div>
                                    <div class="min-w-0">
                                        <div class="text-[11px] font-bold text-[#002d5d] truncate">${ft.name} — ${ft.label}</div>
                                        <div class="text-[9px] text-gray-500 truncate flex items-center gap-1.5">
                                            <i data-lucide="file" class="w-2.5 h-2.5"></i>${f.fileName}
                                            <span class="text-gray-300">·</span>
                                            <span>${f.size}</span>
                                            <span class="text-gray-300">·</span>
                                            <span>${f.uploadedAt}</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="flex items-center gap-1 shrink-0">
                                    <span class="bg-green-500 text-white text-[9px] px-1.5 py-0.5 rounded-full font-bold flex items-center gap-1"><i data-lucide="check" class="w-2.5 h-2.5"></i>مرفوع</span>
                                    ${t.submitted ? '' : `<button onclick="removeFile(${idx},${fi})" class="text-gray-400 hover:text-red-500 p-1" title="إزالة"><i data-lucide="trash-2" class="w-3 h-3"></i></button>`}
                                </div>
                            </div>`;
                        }
                        return `<div class="file-row border-2 border-dashed border-orange-200 bg-orange-50/30 rounded-lg p-2.5 flex items-center justify-between gap-2 cursor-pointer hover:bg-orange-50"
                            onclick="uploadFile(${idx},${fi})"
                            ondragover="event.preventDefault();this.classList.add('drag-over')"
                            ondragleave="this.classList.remove('drag-over')"
                            ondrop="event.preventDefault();this.classList.remove('drag-over');uploadFile(${idx},${fi})">
                            <div class="flex items-center gap-2 min-w-0">
                                <div class="${ft.cls} p-1.5 rounded shrink-0 opacity-70"><i data-lucide="${ft.icon}" class="w-3.5 h-3.5"></i></div>
                                <div class="min-w-0">
                                    <div class="text-[11px] font-bold text-[#002d5d] truncate">${ft.name} — ${ft.label}</div>
                                    <div class="text-[9px] text-gray-500 italic flex items-center gap-1"><i data-lucide="upload-cloud" class="w-2.5 h-2.5"></i>اسحب الملف هنا أو انقر للرفع</div>
                                </div>
                            </div>
                            <span class="bg-orange-100 text-orange-700 text-[9px] px-1.5 py-0.5 rounded-full font-bold shrink-0">في الانتظار</span>
                        </div>`;
                    }).join('');

                const submitDisabled = t.submitted || !allUploaded || totalFiles === 0;
                const submitBtnCls = submitDisabled
                    ? 'bg-gray-200 text-gray-400 cursor-not-allowed'
                    : 'bg-[#28a745] text-white hover:bg-green-700 shadow';
                const submitBtnLabel = t.submitted ? 'تم الإرسال إلى لجنة الاعتماد' : 'إرسال إلى لجنة الاعتماد';
                const submitIcon = t.submitted ? 'check-check' : 'send';

                const card = document.createElement('div');
                card.className = `bg-white rounded-2xl border ${t.submitted ? 'border-purple-200 submitted-card' : 'border-gray-100'} shadow-sm p-4 flex flex-col`;
                card.innerHTML = `
                    <!-- header -->
                    <div class="flex items-start justify-between mb-3 pb-3 border-b border-gray-100">
                        <div class="flex items-start gap-2 min-w-0 cursor-pointer hover:opacity-80" onclick="openProjectModal('${t.id}')" title="عرض التفاصيل">
                            <div class="bg-[#28a745]/10 p-2 rounded-lg shrink-0"><i data-lucide="briefcase" class="w-4 h-4 text-[#28a745]"></i></div>
                            <div class="min-w-0">
                                <h3 class="text-sm font-bold text-[#002d5d] truncate hover:underline">${t.id}</h3>
                                <p class="text-[10px] text-gray-500 truncate">${meta.name}</p>
                            </div>
                        </div>
                        ${statusBadge}
                    </div>

                    <!-- meta tags -->
                    <div class="flex flex-wrap gap-1.5 mb-3 text-[10px]">
                        <span class="bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full">${meta.sector}</span>
                        <span class="bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-bold">${meta.amount} ر.س</span>
                        <span class="bg-blue-50 text-blue-600 px-2 py-0.5 rounded-full">${meta.city}</span>
                    </div>

                    <!-- progress bar -->
                    ${totalFiles > 0 ? `<div class="mb-3">
                        <div class="flex items-center justify-between text-[10px] mb-1">
                            <span class="text-gray-500 font-bold">التقدم</span>
                            <span class="font-bold ${allUploaded ? 'text-green-600' : 'text-orange-500'}">${uploadedFiles}/${totalFiles} ملف · ${progress}%</span>
                        </div>
                        <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden">
                            <div class="${allUploaded ? 'bg-green-500' : 'bg-orange-400'} h-full rounded-full transition-all" style="width:${progress}%"></div>
                        </div>
                    </div>` : ''}

                    <!-- files list -->
                    <div class="flex-1 mb-3">
                        <div class="text-[10px] font-bold text-gray-500 mb-2 flex items-center gap-1">
                            <i data-lucide="file-stack" class="w-3 h-3 text-indigo-500"></i>
                            الملفات المطلوبة
                        </div>
                        <div class="space-y-1.5">${filesHtml}</div>
                    </div>

                    <!-- footer -->
                    <div class="flex justify-between items-center pt-3 border-t border-gray-100">
                        <span class="text-[10px] text-gray-400">${t.submitted ? `أُرسلت ${t.submittedAt}` : 'لم تُرسل بعد'}</span>
                        <button onclick="submitTask(${idx})" ${submitDisabled ? 'disabled' : ''} class="${submitBtnCls} text-xs font-bold px-4 py-2 rounded-lg flex items-center gap-2 transition-all">
                            <i data-lucide="${submitIcon}" class="w-3.5 h-3.5"></i>
                            ${submitBtnLabel}
                        </button>
                    </div>
                `;
                wrap.appendChild(card);
            });
            lucide.createIcons();
        }

        function uploadFile(taskIdx, fileIdx) {
            const f = tasks[taskIdx].files[fileIdx];
            if (f.uploaded || tasks[taskIdx].submitted) return;
            // mock upload
            f.uploaded = true;
            f.fileName = `${f.type.toLowerCase()}_${tasks[taskIdx].id}.pdf`;
            f.size = (Math.random() * 3 + 0.5).toFixed(1) + ' MB';
            f.uploadedAt = 'الآن';
            toast(`تم رفع ${fileTypes[f.type].name}`, 'success');
            renderTasks();
            updateStats();
        }

        function removeFile(taskIdx, fileIdx) {
            const f = tasks[taskIdx].files[fileIdx];
            f.uploaded = false;
            delete f.fileName;
            delete f.size;
            delete f.uploadedAt;
            toast(`تمت إزالة الملف`, 'info');
            renderTasks();
            updateStats();
        }

        function submitTask(taskIdx) {
            const t = tasks[taskIdx];
            if (t.submitted) return;
            const allUploaded = t.files.length > 0 && t.files.every(f => f.uploaded);
            if (!allUploaded) {
                toast('يجب رفع جميع الملفات المطلوبة قبل الإرسال', 'warning');
                return;
            }
            t.submitted = true;
            t.submittedAt = 'الآن';
            toast(`تم إرسال ${t.id} إلى لجنة الاعتماد`, 'success');
            renderTasks();
            updateStats();
        }

        function toast(message, type = 'info') {
            const colors = { info: 'bg-blue-500', success: 'bg-green-500', warning: 'bg-orange-500' };
            const t = document.createElement('div');
            t.className = `fixed bottom-6 left-1/2 transform -translate-x-1/2 ${colors[type]} text-white px-6 py-3 rounded-lg shadow-lg text-sm font-bold flex items-center gap-2 z-50`;
            t.innerHTML = `<i data-lucide="${type === 'success' ? 'check-circle' : type === 'warning' ? 'alert-triangle' : 'info'}" class="w-4 h-4"></i><span>${message}</span>`;
            document.body.appendChild(t);
            lucide.createIcons();
            setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 2500);
        }

        renderTasks();
        updateStats();
    </script>
</body>
</html>
