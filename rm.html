<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة مدير العلاقات (RM) - SIDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f7f9fb;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 30 L15 45 L30 30 L45 15 L60 30' fill='none' stroke='%23e5e7eb' stroke-width='0.5'/%3E%3C/svg%3E");
        }
        .active-sidebar-item {
            color: #28a745;
            background-color: #f0fdf4;
            border-right: 4px solid #28a745;
        }
        .scroll-hide::-webkit-scrollbar { display: none; }

        /* Phase steps */
        .phase-mini {
            width: 28px; height: 28px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-right">

    <button onclick="toggleSidebar()" class="md:hidden fixed top-3 right-3 z-50 bg-white border border-gray-200 rounded-lg p-2 shadow-md">
        <i data-lucide="menu" class="w-5 h-5 text-[#002d5d]"></i>
    </button>
    <div id="sidebar-backdrop" onclick="toggleSidebar()" class="md:hidden fixed inset-0 bg-black/40 z-30 hidden"></div>

    <aside id="sidebar" class="w-24 bg-white border-l border-gray-200 flex flex-col items-center py-6 shrink-0 shadow-sm fixed md:static right-0 top-0 h-full z-40 transform translate-x-full md:translate-x-0 transition-transform">
        <div class="mb-10 text-center">
            <img src="images/SIDF_menu_logo.png" alt="Logo" class="w-12 h-12 object-contain mb-1 cursor-pointer" onclick="window.location.href='rm.html'">
            <span class="text-[10px] text-gray-300 font-sans block">v2.0.5</span>
        </div>

        <nav class="w-full flex flex-col gap-1">
            <a href="rm.html" class="active-sidebar-item flex flex-col items-center py-4 gap-1 text-[11px] font-bold">
                <i data-lucide="layout-dashboard" class="w-6 h-6"></i>
                <span>الرئيسية</span>
            </a>
            <a href="rm-workload.html" class="flex flex-col items-center py-4 gap-1 text-[11px] text-gray-400 hover:bg-gray-50 transition-all">
                <i data-lucide="split" class="w-6 h-6"></i>
                <span>التوزيع</span>
            </a>
            <a href="rm-tasks.html" class="flex flex-col items-center py-4 gap-1 text-[11px] text-gray-400 hover:bg-gray-50 transition-all">
                <i data-lucide="clipboard-check" class="w-6 h-6"></i>
                <span>مهام</span>
            </a>
            <a href="rm-chats.html" class="flex flex-col items-center py-4 gap-1 text-[11px] text-gray-400 hover:bg-gray-50 transition-all">
                <i data-lucide="messages-square" class="w-6 h-6"></i>
                <span>المحادثات</span>
            </a>

            <a href="index.html" class="flex flex-col items-center py-4 mt-10 gap-1 text-[11px] text-red-300 hover:text-red-500 transition-all">
                <i data-lucide="log-out" class="w-6 h-6"></i>
                <span>خروج</span>
            </a>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col overflow-hidden">

        <header class="bg-white h-16 border-b border-gray-100 flex items-center justify-between px-4 md:px-8 z-10 shadow-sm gap-2">
            <div class="flex items-center gap-2 md:gap-4 min-w-0 pr-12 md:pr-0">
                <h1 class="text-[#002d5d] font-bold text-sm md:text-xl truncate">لوحة مدير العلاقات (RM)</h1>
                <span class="hidden md:inline text-xs bg-gray-100 text-gray-500 px-3 py-1 rounded-full font-bold">بوابة الـ RM</span>
            </div>
            <div class="flex items-center gap-4">
                <div class="bg-green-600 rounded-full p-2 text-white shadow-sm"><i data-lucide="user-cog" class="w-5 h-5"></i></div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 scroll-hide">

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
                <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm flex items-center justify-between border-r-4 border-purple-500">
                    <div>
                        <p class="text-xs text-gray-400 font-bold mb-1">طلبات جديدة</p>
                        <p class="text-3xl font-bold text-purple-600">5</p>
                        <p class="text-[10px] text-purple-500 font-bold mt-1 flex items-center gap-1">
                            <i data-lucide="trending-up" class="w-3 h-3"></i>
                            خلال آخر 24 ساعة
                        </p>
                    </div>
                    <div class="bg-purple-50 p-3 rounded-xl text-purple-600"><i data-lucide="bell-ring" class="w-6 h-6"></i></div>
                </div>
                <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm flex items-center justify-between">
                    <div>
                        <p class="text-xs text-gray-400 font-bold mb-1">إجمالي الطلبات</p>
                        <p class="text-3xl font-bold text-[#002d5d]">18</p>
                    </div>
                    <div class="bg-blue-50 p-3 rounded-xl text-[#002d5d]"><i data-lucide="file-text" class="w-6 h-6"></i></div>
                </div>
                <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm flex items-center justify-between">
                    <div>
                        <p class="text-xs text-gray-400 font-bold mb-1">رسائل غير مقروءة</p>
                        <p class="text-3xl font-bold text-orange-500">4</p>
                    </div>
                    <div class="bg-orange-50 p-3 rounded-xl text-orange-500"><i data-lucide="message-circle" class="w-6 h-6"></i></div>
                </div>
                <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm flex items-center justify-between border-r-4 border-green-500">
                    <div>
                        <p class="text-xs text-gray-400 font-bold mb-1">مجموعات تحت الإشراف</p>
                        <p class="text-3xl font-bold text-green-600">5</p>
                    </div>
                    <div class="bg-green-50 p-3 rounded-xl text-green-500"><i data-lucide="users-round" class="w-6 h-6"></i></div>
                </div>
            </div>

            <!-- Orders Table -->
            <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
                <div class="p-4 md:p-6 border-b border-gray-50 bg-gray-50/20 flex flex-col md:flex-row md:items-center justify-between gap-3 md:gap-4">
                    <h3 class="text-[#002d5d] font-bold text-sm shrink-0 flex items-center gap-2">
                        <i data-lucide="inbox" class="w-4 h-4 text-orange-500"></i>
                        الطلبات الواردة
                    </h3>
                    <div class="relative w-full md:flex-1 md:max-w-md">
                        <i data-lucide="search" class="w-4 h-4 text-gray-400 absolute right-3 top-1/2 -translate-y-1/2"></i>
                        <input id="orders-search" type="text" oninput="filterOrders()" placeholder="ابحث برقم الطلب أو اسم المنشأة..."
                               class="w-full bg-white border border-gray-200 rounded-lg pr-10 pl-3 py-2 text-xs outline-none focus:border-green-500 transition-colors text-right">
                    </div>
                </div>

                <div class="overflow-x-auto">
                <table id="orders-table" class="w-full min-w-[640px] text-right text-xs">
                    <thead class="bg-[#eef5ed] text-gray-600 font-bold">
                        <tr>
                            <th class="p-4 border-l border-white">رقم الطلب</th>
                            <th class="p-4 border-l border-white">اسم المنشأة</th>
                            <th class="p-4 border-l border-white text-center">الحالة</th>
                            <th class="p-4 border-l border-white text-center">المجموعة المعنية</th>
                            <th class="p-4 text-center">المحادثة</th>
                        </tr>
                    </thead>
                    <tbody id="orders-body" class="divide-y divide-gray-50"></tbody>
                </table>
                </div>
            </div>

        </main>
    </div>

    <!-- Project Detail Modal -->
    <div id="project-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-3xl max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
            <div class="p-5 border-b border-gray-100 flex items-center justify-between sticky top-0 bg-white z-10">
                <div class="flex items-center gap-3">
                    <div class="bg-[#28a745]/10 p-2 rounded-lg"><i data-lucide="briefcase" class="w-5 h-5 text-[#28a745]"></i></div>
                    <div>
                        <h3 id="modal-title" class="text-[#002d5d] font-bold text-base">—</h3>
                        <p id="modal-subtitle" class="text-xs text-gray-500">—</p>
                    </div>
                </div>
                <button onclick="closeProjectModal()" class="text-gray-400 hover:text-red-500 transition-colors p-2">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div id="modal-body" class="p-6"></div>
        </div>
    </div>

    <!-- Submitted-document PDF viewer -->
    <div id="doc-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] hidden flex items-center justify-center p-4" onclick="if(event.target===this)closeDocModal()">
        <div class="w-full max-w-2xl">
            <div class="flex items-center justify-between mb-2">
                <div id="doc-modal-name" class="text-white text-sm font-bold flex items-center gap-2"><i data-lucide="file-text" class="w-4 h-4"></i> <span>—</span></div>
                <div class="flex items-center gap-2">
                    <button onclick="window.print()" class="bg-white/10 hover:bg-white/20 text-white text-xs px-3 py-1.5 rounded-lg flex items-center gap-1"><i data-lucide="download" class="w-3 h-3"></i> تنزيل</button>
                    <button onclick="closeDocModal()" class="bg-white/10 hover:bg-white/20 text-white p-1.5 rounded-lg"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>
            </div>
            <div style="background:#525659;padding:16px;border-radius:8px;height:76vh;overflow-y:auto">
                <div id="doc-modal-page" style="background:#fff;padding:34px 30px;border-radius:2px;box-shadow:0 1px 4px rgba(0,0,0,0.35);direction:rtl;color:#1f2937;font-size:12px;line-height:1.75;font-family:'Cairo',sans-serif"></div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('translate-x-full');
            document.getElementById('sidebar-backdrop').classList.toggle('hidden');
        }

        const phaseLabels = ['Loan Application','Evaluation','Approval','Signing','Disbursement','Loan Closing'];

        const orders = [
            { id: 'RQ-2024-321', name: 'منشأة الطاقة الجديدة', sector: 'الطاقة المتجددة', amount: '25,000,000', owner: 'عبدالله السعيد', city: 'الرياض', status: 'Evaluation',  statusClass: 'bg-purple-100 text-purple-700', group: 'مجموعة 1', phase: 2, risk: 'low' },
            { id: 'RQ-2024-772', name: 'شركة الغاز الوطنية',     sector: 'النفط والغاز',     amount: '60,000,000', owner: 'فهد منصور',    city: 'الدمام', status: 'قيد المعالجة', statusClass: 'bg-orange-50 text-orange-600', group: 'مجموعة 1', phase: 2, risk: 'high' },
            { id: 'RQ-2024-815', name: 'مجموعة البتروكيماويات',  sector: 'البتروكيماويات',  amount: '45,500,000', owner: 'خالد العمري', city: 'الجبيل', status: 'بانتظار الفريق', statusClass: 'bg-blue-50 text-blue-600',     group: 'مجموعة 1', phase: 3, risk: 'medium' },
            { id: 'RQ-2024-901', name: 'شركة التقنية الحديثة',   sector: 'التقنية والذكاء الاصطناعي', amount: '12,500,000', owner: 'ريم عبدالله', city: 'الرياض', status: 'مكتمل', statusClass: 'bg-green-100 text-green-700',  group: 'مجموعة 1', phase: 5, risk: 'low' },
            { id: 'RQ-2024-944', name: 'شركة الطاقة المستدامة',  sector: 'الطاقة المتجددة', amount: '18,000,000', owner: 'سارة خالد',   city: 'تبوك',   status: 'جديد', statusClass: 'bg-purple-100 text-purple-700', group: 'مجموعة 1', phase: 1, risk: 'low' }
        ];

        function riskBadge(o) {
            const map = {
                low:    { cls: 'bg-green-50 text-green-700',   icon: 'shield-check', label: 'منخفض' },
                medium: { cls: 'bg-orange-50 text-orange-700', icon: 'shield-alert', label: 'متوسط' },
                high:   { cls: 'bg-red-50 text-red-700',       icon: 'shield-x',     label: 'عالي' }
            };
            const m = map[o.risk];
            return `<span class="${m.cls} inline-flex items-center gap-1 px-2 py-1 rounded-full text-[10px] font-bold"><i data-lucide="${m.icon}" class="w-3 h-3"></i>${m.label}</span>`;
        }

        function renderOrders() {
            document.getElementById('orders-body').innerHTML = orders.map(o => `
                <tr class="hover:bg-gray-50 transition-all cursor-pointer" onclick="openProjectModal('${o.id}')">
                    <td class="p-4 font-bold text-[#002d5d] whitespace-nowrap">${o.id}</td>
                    <td class="p-4 font-bold text-gray-500">${o.name}</td>
                    <td class="p-4 text-center"><span class="${o.statusClass} px-3 py-1 rounded-full text-[9px] font-bold whitespace-nowrap">${o.status}</span></td>
                    <td class="p-4 text-center text-purple-600 font-bold whitespace-nowrap">${o.group}</td>
                    <td class="p-4 text-center" onclick="event.stopPropagation()">
                        <a href="rm-chats.html?order=${o.id}" class="inline-flex items-center gap-1 bg-green-50 hover:bg-green-100 text-green-700 px-3 py-1.5 rounded-lg text-[10px] font-bold transition-all">
                            <i data-lucide="message-square" class="w-3 h-3"></i>
                            فتح
                        </a>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        let modalOrder = null;

        function attachedFilesHtml() {
            return Object.entries(submittedDocs).map(([k, d]) => `
                <button type="button" onclick="openSubmittedDoc('${k}')" class="w-full flex items-center gap-2 bg-gray-50 hover:bg-gray-100 border border-gray-100 rounded-lg px-2.5 py-2 text-right transition-colors group">
                    <i data-lucide="file-text" class="w-4 h-4 text-red-500 shrink-0"></i>
                    <span class="text-xs text-gray-700 flex-1">${d.title}</span>
                    <span class="text-[9px] text-gray-400 group-hover:text-[#28a745] font-mono">${d.file}</span>
                    <i data-lucide="external-link" class="w-3 h-3 text-gray-300 group-hover:text-[#28a745]"></i>
                </button>`).join('');
        }

        const docRow = (k, v) => `<div style="display:flex;justify-content:space-between;gap:16px;padding:8px 0;border-bottom:1px solid #f3f4f6"><span style="color:#6b7280">${k}</span><span style="font-weight:700;color:#111827;text-align:left">${v}</span></div>`;
        const docHeading = (t) => `<div style="color:#002d5d;font-size:13px;font-weight:700;margin:20px 0 6px;padding-bottom:4px;border-bottom:2px solid #e5e7eb">${t}</div>`;

        const submittedDocs = {
            fs: {
                file: 'feasibility_study.pdf', title: 'دراسة الجدوى',
                body: (o) => docHeading('ملخص المشروع')
                    + docRow('اسم المشروع', o.name || '—')
                    + docRow('القطاع', o.sector || '—')
                    + docRow('موقع المشروع', o.city || '—')
                    + docHeading('الجوانب المالية')
                    + docRow('التكلفة الإجمالية للمشروع', '12,500,000 ر.س')
                    + docRow('نسبة المساهمة الذاتية', '30%')
                    + docRow('مبلغ التمويل المطلوب من الصندوق', (o.amount || '—') + ' ر.س')
                    + docRow('أُعدّت بواسطة', 'مكتب استشاري معتمد')
                    + `<p style="margin-top:16px;color:#4b5563;font-size:11px">تتضمن دراسة الجدوى تحليلاً للسوق المستهدف، الطاقة الإنتاجية المتوقعة، والتدفقات النقدية للسنوات الخمس الأولى من تشغيل المشروع.</p>`
            },
            fin: {
                file: 'audited_financials.pdf', title: 'القوائم المالية المدققة',
                body: (o) => docHeading('بيانات المراجعة')
                    + docRow('السنوات المشمولة', '2022 - 2024')
                    + docRow('مكتب المراجعة', 'مكتب محاسبة قانونية')
                    + docHeading('أبرز المؤشرات')
                    + docRow('إجمالي الأصول', '8,300,000 ر.س')
                    + docRow('صافي الربح (آخر سنة)', '1,150,000 ر.س')
                    + `<p style="margin-top:16px;color:#4b5563;font-size:11px">القوائم مدققة من مكتب محاسبة قانونية معتمد وتعكس المركز المالي للمنشأة خلال الفترة المشمولة.</p>`
            },
            nw: {
                file: 'net_worth_statement.pdf', title: 'إقرار صافي الثروة',
                body: (o) => docHeading('بيان صافي الثروة')
                    + docRow('إجمالي صافي الثروة', '21,000,000 ر.س')
                    + docRow('الأصول العقارية', '14,000,000 ر.س')
                    + docRow('أصول نقدية واستثمارات', '7,000,000 ر.س')
                    + docRow('تاريخ الإقرار', '2026-04-10')
                    + `<p style="margin-top:16px;color:#4b5563;font-size:11px">إقرار موقّع من مالك المنشأة بصافي الثروة الشخصية كضمان داعم للطلب.</p>`
            }
        };

        function openSubmittedDoc(key) {
            const d = submittedDocs[key];
            if (!d) return;
            const o = modalOrder || {};
            document.querySelector('#doc-modal-name span').textContent = d.file;
            document.getElementById('doc-modal-page').innerHTML = `
                <div style="text-align:center;border-bottom:2px solid #002d5d;padding-bottom:14px;margin-bottom:6px">
                    <div style="color:#002d5d;font-size:18px;font-weight:700">${d.title}</div>
                    <div style="color:#6b7280;font-size:10px;margin-top:4px">صندوق التنمية الصناعية السعودي — مستند مقدّم ضمن الطلب</div>
                    <div style="color:#9ca3af;font-size:9px;margin-top:3px">${o.id || ''}${o.name ? ' · ' + o.name : ''}</div>
                </div>
                ${d.body(o)}
                <div style="border-top:1px solid #e5e7eb;padding-top:10px;margin-top:26px;text-align:center;color:#9ca3af;font-size:9px">وثيقة مقدّمة من العميل ضمن طلب التمويل — SIDF</div>`;
            document.getElementById('doc-modal').classList.remove('hidden');
            lucide.createIcons();
        }

        function closeDocModal() {
            document.getElementById('doc-modal').classList.add('hidden');
        }

        function openProjectModal(id) {
            const o = orders.find(x => x.id === id);
            if (!o) return;
            modalOrder = o;
            document.getElementById('modal-title').textContent = `${o.id} — ${o.name}`;
            document.getElementById('modal-subtitle').textContent = `${o.sector} · ${o.city} · ${o.amount} ر.س`;

            const phaseDots = phaseLabels.map((lbl, i) => {
                const idx = i + 1;
                const cls = idx < o.phase ? 'bg-[#28a745] text-white' : (idx === o.phase ? 'bg-orange-50 border-2 border-orange-400 text-orange-500' : 'bg-gray-100 text-gray-400');
                return `<div class="flex flex-col items-center gap-1 flex-1">
                    <div class="phase-mini ${cls}">${idx < o.phase ? '✓' : idx}</div>
                    <span class="text-[9px] font-bold text-gray-500 text-center">${lbl}</span>
                </div>`;
            }).join('');

            document.getElementById('modal-body').innerHTML = `
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
                    <div class="bg-gray-50 rounded-lg p-3 text-right">
                        <div class="text-[10px] text-gray-400 font-bold mb-1">رقم الطلب</div>
                        <div class="text-sm font-bold text-[#002d5d]">${o.id}</div>
                    </div>
                    <div class="bg-gray-50 rounded-lg p-3 text-right">
                        <div class="text-[10px] text-gray-400 font-bold mb-1">القطاع</div>
                        <div class="text-sm font-bold text-[#002d5d]">${o.sector}</div>
                    </div>
                    <div class="bg-gray-50 rounded-lg p-3 text-right">
                        <div class="text-[10px] text-gray-400 font-bold mb-1">المبلغ</div>
                        <div class="text-sm font-bold text-[#28a745]">${o.amount} ر.س</div>
                    </div>
                    <div class="bg-gray-50 rounded-lg p-3 text-right">
                        <div class="text-[10px] text-gray-400 font-bold mb-1">المدينة</div>
                        <div class="text-sm font-bold text-[#002d5d]">${o.city}</div>
                    </div>
                </div>

                <div class="mb-6">
                    <div class="text-xs font-bold text-[#002d5d] mb-3 flex items-center gap-2">
                        <i data-lucide="git-branch" class="w-4 h-4 text-[#28a745]"></i> مراحل الطلب
                    </div>
                    <div class="overflow-x-auto -mx-1 px-1"><div class="flex items-start gap-2" style="min-width:440px">${phaseDots}</div></div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    <div class="border border-gray-100 rounded-lg p-4">
                        <div class="text-xs font-bold text-[#002d5d] mb-2 flex items-center gap-2"><i data-lucide="user" class="w-4 h-4 text-[#28a745]"></i> المالك</div>
                        <div class="text-xs text-gray-600">${o.owner}</div>
                        <div class="text-[10px] text-gray-400 mt-1">نسبة الملكية: 100%</div>
                    </div>
                    <div class="border border-gray-100 rounded-lg p-4">
                        <div class="text-xs font-bold text-[#002d5d] mb-2 flex items-center gap-2"><i data-lucide="users-round" class="w-4 h-4 text-[#28a745]"></i> المجموعة المعنية</div>
                        <div class="text-xs text-gray-600">${o.group}</div>
                        <div class="text-[10px] text-gray-400 mt-1">${riskBadge(o)} <span class="ml-2">تقييم المخاطر</span></div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    <div class="border border-gray-100 rounded-lg p-4">
                        <div class="text-xs font-bold text-[#002d5d] mb-2 flex items-center gap-2"><i data-lucide="file-stack" class="w-4 h-4 text-indigo-500"></i> الملفات المرفقة</div>
                        <div class="text-[9px] text-gray-400 mb-2">اضغط على أي ملف لعرض الطلب المقدّم من العميل</div>
                        <div class="space-y-1.5">${attachedFilesHtml()}</div>
                    </div>
                    <div class="border border-gray-100 rounded-lg p-4">
                        <div class="text-xs font-bold text-[#002d5d] mb-2 flex items-center gap-2"><i data-lucide="alert-triangle" class="w-4 h-4 text-orange-500"></i> النواقص</div>
                        ${o.phase < 3 || o.risk === 'high' ? `
                            <div class="text-xs text-orange-700 flex items-center justify-between bg-orange-50 rounded p-2 mb-1">
                                <span>تحديث جدول التدفقات النقدية</span>
                                <span class="text-[10px] font-bold">باقي 3 أيام</span>
                            </div>
                            <div class="text-xs text-orange-700 flex items-center justify-between bg-orange-50 rounded p-2">
                                <span>القوائم المالية لسنة 2023</span>
                                <span class="text-[10px] font-bold">باقي 5 أيام</span>
                            </div>
                        ` : '<div class="text-xs text-gray-400 italic text-center py-2">لا توجد نواقص</div>'}
                    </div>
                </div>

                <div class="flex justify-between items-center pt-3 border-t border-gray-100">
                    <button onclick="closeProjectModal()" class="bg-white border border-gray-200 text-gray-600 px-5 py-2 rounded-lg text-xs font-bold hover:bg-gray-50">إغلاق</button>
                    <div class="flex items-center gap-2">
                        <a href="rm-workload.html?order=${o.id}" class="bg-[#002d5d] hover:bg-[#013a78] text-white px-5 py-2 rounded-lg text-xs font-bold shadow flex items-center gap-2">
                            <i data-lucide="share-2" class="w-3 h-3"></i> اذهب للتوزيع
                        </a>
                        <a href="rm-chats.html?order=${o.id}" class="bg-[#28a745] hover:bg-green-700 text-white px-5 py-2 rounded-lg text-xs font-bold shadow flex items-center gap-2">
                            <i data-lucide="message-square" class="w-3 h-3"></i> فتح المحادثة
                        </a>
                    </div>
                </div>
            `;

            const modal = document.getElementById('project-modal');
            modal.classList.remove('hidden');
            lucide.createIcons();
        }

        function closeProjectModal() {
            document.getElementById('project-modal').classList.add('hidden');
        }

        document.getElementById('project-modal').addEventListener('click', function(e) {
            if (e.target === this) closeProjectModal();
        });

        function filterOrders() {
            const q = document.getElementById('orders-search').value.trim().toLowerCase();
            document.querySelectorAll('#orders-table tbody tr').forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = !q || text.includes(q) ? '' : 'none';
            });
        }

        renderOrders();
    </script>
</body>
</html>
