<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>توزيع ملفات المجموعات (RM) - SIDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f7f9fb;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 30 L15 45 L30 30 L45 15 L60 30' fill='none' stroke='%23e5e7eb' stroke-width='0.5'/%3E%3C/svg%3E");
        }
        .active-sidebar-item {
            color: #28a745;
            background-color: #f0fdf4;
            border-right: 4px solid #28a745;
        }
        .scroll-hide::-webkit-scrollbar { display: none; }

        .order-card, .file-card {
            cursor: grab;
            transition: all 0.25s;
        }
        .order-card:active, .file-card:active { cursor: grabbing; opacity: 0.7; }
        .dragging { opacity: 0.5; transform: rotate(1deg); }

        .file-mrd { background:#dbeafe; color:#1e40af; border-color:#93c5fd; }
        .file-ftr { background:#fed7aa; color:#9a3412; border-color:#fdba74; }
        .file-fmr { background:#dcfce7; color:#166534; border-color:#86efac; }
        .file-own { background:#ede9fe; color:#5b21b6; border-color:#c4b5fd; }
        .file-per { background:#fef3c7; color:#854d0e; border-color:#fde68a; }
        .file-rsk { background:#fee2e2; color:#991b1b; border-color:#fca5a5; }
        .file-crm { background:#cffafe; color:#155e75; border-color:#67e8f9; }

        .group-zone { transition: all 0.25s; }
        .group-zone.drag-over { background-color:#f0fdf4; border-color:#28a745; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-right">

    <button onclick="toggleSidebar()" class="md:hidden fixed top-3 right-3 z-50 bg-white border border-gray-200 rounded-lg p-2 shadow-md">
        <i data-lucide="menu" class="w-5 h-5 text-[#002d5d]"></i>
    </button>
    <div id="sidebar-backdrop" onclick="toggleSidebar()" class="md:hidden fixed inset-0 bg-black/40 z-30 hidden"></div>

    <aside id="sidebar" class="w-24 bg-white border-l border-gray-200 flex flex-col items-center py-6 shrink-0 shadow-sm fixed md:static right-0 top-0 h-full z-40 transform translate-x-full md:translate-x-0 transition-transform">
        <div class="mb-10 text-center">
            <img src="images/SIDF_menu_logo.png" alt="Logo" class="w-12 h-12 object-contain mb-1 cursor-pointer" onclick="window.location.href='rm.html'">
            <span class="text-[10px] text-gray-300 font-sans block">v2.0.5</span>
        </div>

        <nav class="w-full flex flex-col gap-1">
            <a href="rm.html" class="flex flex-col items-center py-4 gap-1 text-[11px] text-gray-400 hover:bg-gray-50 transition-all">
                <i data-lucide="layout-dashboard" class="w-6 h-6"></i>
                <span>الرئيسية</span>
            </a>
            <a href="rm-workload.html" class="active-sidebar-item flex flex-col items-center py-4 gap-1 text-[11px] font-bold">
                <i data-lucide="split" class="w-6 h-6"></i>
                <span>التوزيع</span>
            </a>
            <a href="rm-chats.html" class="flex flex-col items-center py-4 gap-1 text-[11px] text-gray-400 hover:bg-gray-50 transition-all">
                <i data-lucide="messages-square" class="w-6 h-6"></i>
                <span>المحادثات</span>
            </a>
            <a href="index.html" class="flex flex-col items-center py-4 mt-10 gap-1 text-[11px] text-red-300 hover:text-red-500 transition-all">
                <i data-lucide="log-out" class="w-6 h-6"></i>
                <span>خروج</span>
            </a>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col overflow-hidden">

        <header class="bg-white h-16 border-b border-gray-100 flex items-center justify-between px-4 md:px-8 z-10 shadow-sm gap-2">
            <div class="flex items-center gap-2 md:gap-4 min-w-0 pr-12 md:pr-0">
                <h1 class="text-[#002d5d] font-bold text-base md:text-lg truncate">توزيع ملفات المجموعات</h1>
                <span class="hidden md:inline text-xs text-gray-400 bg-gray-50 px-3 py-1 rounded-full">اسحب الملفات على المجموعة</span>
            </div>
            <div class="flex items-center gap-4">
                <div class="bg-green-600 rounded-full p-2 text-white shadow-sm"><i data-lucide="user-cog" class="w-5 h-5"></i></div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 scroll-hide">

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 items-start">

                <!-- Column 1: Incoming Requests -->
                <div class="lg:col-span-3 bg-white rounded-2xl border border-gray-100 shadow-sm p-4">
                    <div class="flex items-center justify-between mb-3">
                        <h3 class="text-[#002d5d] font-bold text-sm flex items-center gap-2">
                            <i data-lucide="inbox" class="w-4 h-4 text-orange-500"></i>
                            الطلبات الواردة
                        </h3>
                        <span id="orders-count" class="text-[10px] bg-orange-50 text-orange-600 px-2 py-0.5 rounded-full font-bold">0</span>
                    </div>
                    <div id="orders-pool" class="flex flex-col gap-2 overflow-y-auto pr-1 scroll-hide" style="max-height:75vh"></div>
                </div>

                <!-- Column 2: Required Files -->
                <div class="lg:col-span-3 bg-white rounded-2xl border border-gray-100 shadow-sm p-4">
                    <div class="flex items-center justify-between mb-3">
                        <h3 class="text-[#002d5d] font-bold text-sm flex items-center gap-2">
                            <i data-lucide="file-stack" class="w-4 h-4 text-indigo-500"></i>
                            الملفات المطلوبة من المجموعة
                        </h3>
                    </div>
                    <p class="text-[10px] text-gray-400 italic mb-3">اسحب الملف على المجموعة المعنية</p>
                    <div id="files-pool" class="flex flex-col gap-3 overflow-y-auto pr-1 scroll-hide" style="max-height:75vh"></div>
                </div>

                <!-- Column 3: Groups -->
                <div class="lg:col-span-6 bg-white rounded-2xl border border-gray-100 shadow-sm p-4">
                    <div class="flex items-center justify-between mb-3">
                        <h3 class="text-[#002d5d] font-bold text-sm flex items-center gap-2">
                            <i data-lucide="users-round" class="w-4 h-4 text-purple-600"></i>
                            مجموعات العمل
                            <span id="groups-count" class="text-[10px] bg-purple-50 text-purple-600 px-2 py-0.5 rounded-full font-bold mr-1">0</span>
                        </h3>
                        <span class="text-[9px] text-gray-400 italic">جاهزة من الإدمن</span>
                    </div>
                    <div id="groups-container" class="grid grid-cols-1 md:grid-cols-2 gap-3 overflow-y-auto pr-1 scroll-hide" style="max-height:75vh"></div>
                </div>

            </div>

            <!-- Project Detail Modal -->
            <div id="project-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
                <div class="bg-white rounded-2xl shadow-xl w-full max-w-3xl max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
                    <div class="p-5 border-b border-gray-100 flex items-center justify-between sticky top-0 bg-white z-10">
                        <div class="flex items-center gap-3">
                            <div class="bg-[#28a745]/10 p-2 rounded-lg"><i data-lucide="briefcase" class="w-5 h-5 text-[#28a745]"></i></div>
                            <div>
                                <h3 id="modal-title" class="text-[#002d5d] font-bold text-base">—</h3>
                                <p id="modal-subtitle" class="text-xs text-gray-500">—</p>
                            </div>
                        </div>
                        <button onclick="closeProjectModal()" class="text-gray-400 hover:text-red-500 transition-colors p-2">
                            <i data-lucide="x" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <div id="modal-body" class="p-6"></div>
                </div>
            </div>

        </main>
    </div>

    <script>
        lucide.createIcons();

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('translate-x-full');
            document.getElementById('sidebar-backdrop').classList.toggle('hidden');
        }

        const orders = [
            { id: 'RQ-2024-944', name: 'شركة الطاقة المستدامة' }
        ];

        const projectMeta = {
            'RQ-2024-321': { sector: 'الطاقة المتجددة',         amount: '25,000,000', owner: 'عبدالله السعيد', city: 'الرياض', group: 'مجموعة 1', phase: 2, risk: 'low' },
            'RQ-2024-772': { sector: 'النفط والغاز',            amount: '60,000,000', owner: 'فهد منصور',     city: 'الدمام', group: 'مجموعة 2', phase: 2, risk: 'high' },
            'RQ-2024-815': { sector: 'البتروكيماويات',          amount: '45,500,000', owner: 'خالد العمري',  city: 'الجبيل', group: 'مجموعة 1', phase: 3, risk: 'medium' },
            'RQ-2024-901': { sector: 'التقنية والذكاء الاصطناعي', amount: '12,500,000', owner: 'ريم عبدالله',  city: 'الرياض', group: 'مجموعة 3', phase: 5, risk: 'low' },
            'RQ-2024-944': { sector: 'الطاقة المتجددة',         amount: '18,000,000', owner: 'سارة خالد',    city: 'تبوك',   group: 'مجموعة 4', phase: 1, risk: 'low' }
        };
        const phaseLabels = ['Loan Application','Evaluation','Approval','Signing','Disbursement','Loan Closing'];
        function modalRiskBadge(risk) {
            const map = { low: { cls: 'bg-green-50 text-green-700', icon: 'shield-check', label: 'منخفض' }, medium: { cls: 'bg-orange-50 text-orange-700', icon: 'shield-alert', label: 'متوسط' }, high: { cls: 'bg-red-50 text-red-700', icon: 'shield-x', label: 'عالي' } };
            const m = map[risk];
            return `<span class="${m.cls} inline-flex items-center gap-1 px-2 py-1 rounded-full text-[10px] font-bold"><i data-lucide="${m.icon}" class="w-3 h-3"></i>${m.label}</span>`;
        }
        function openProjectModal(id) {
            const proj = orders.find(p => p.id === id) || { id, name: id };
            const o = Object.assign({ id: proj.id, name: proj.name }, projectMeta[id] || { sector: '—', amount: '—', owner: '—', city: '—', group: '—', phase: 1, risk: 'low' });
            document.getElementById('modal-title').textContent = `${o.id} — ${o.name}`;
            document.getElementById('modal-subtitle').textContent = `${o.sector} · ${o.city} · ${o.amount} ر.س`;
            const phaseDots = phaseLabels.map((lbl, i) => {
                const idx = i + 1;
                const cls = idx < o.phase ? 'bg-[#28a745] text-white' : (idx === o.phase ? 'bg-orange-50 border-2 border-orange-400 text-orange-500' : 'bg-gray-100 text-gray-400');
                return `<div class="flex flex-col items-center gap-1 flex-1"><div class="w-8 h-8 rounded-full flex items-center justify-center text-[11px] font-bold ${cls}">${idx < o.phase ? '✓' : idx}</div><span class="text-[9px] font-bold text-gray-500 text-center">${lbl}</span></div>`;
            }).join('');
            document.getElementById('modal-body').innerHTML = `
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
                    <div class="bg-gray-50 rounded-lg p-3 text-right"><div class="text-[10px] text-gray-400 font-bold mb-1">رقم الطلب</div><div class="text-sm font-bold text-[#002d5d]">${o.id}</div></div>
                    <div class="bg-gray-50 rounded-lg p-3 text-right"><div class="text-[10px] text-gray-400 font-bold mb-1">القطاع</div><div class="text-sm font-bold text-[#002d5d]">${o.sector}</div></div>
                    <div class="bg-gray-50 rounded-lg p-3 text-right"><div class="text-[10px] text-gray-400 font-bold mb-1">المبلغ</div><div class="text-sm font-bold text-[#28a745]">${o.amount} ر.س</div></div>
                    <div class="bg-gray-50 rounded-lg p-3 text-right"><div class="text-[10px] text-gray-400 font-bold mb-1">المدينة</div><div class="text-sm font-bold text-[#002d5d]">${o.city}</div></div>
                </div>
                <div class="mb-6"><div class="text-xs font-bold text-[#002d5d] mb-3 flex items-center gap-2"><i data-lucide="git-branch" class="w-4 h-4 text-[#28a745]"></i> مراحل الطلب</div><div class="overflow-x-auto -mx-1 px-1"><div class="flex items-start gap-2" style="min-width:440px">${phaseDots}</div></div></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    <div class="border border-gray-100 rounded-lg p-4"><div class="text-xs font-bold text-[#002d5d] mb-2 flex items-center gap-2"><i data-lucide="user" class="w-4 h-4 text-[#28a745]"></i> المالك</div><div class="text-xs text-gray-600">${o.owner}</div><div class="text-[10px] text-gray-400 mt-1">نسبة الملكية: 100%</div></div>
                    <div class="border border-gray-100 rounded-lg p-4"><div class="text-xs font-bold text-[#002d5d] mb-2 flex items-center gap-2"><i data-lucide="users-round" class="w-4 h-4 text-[#28a745]"></i> المجموعة المعنية</div><div class="text-xs text-gray-600">${o.group}</div><div class="text-[10px] text-gray-400 mt-1">${modalRiskBadge(o.risk)} <span class="ml-2">تقييم المخاطر</span></div></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    <div class="border border-gray-100 rounded-lg p-4"><div class="text-xs font-bold text-[#002d5d] mb-2 flex items-center gap-2"><i data-lucide="file-stack" class="w-4 h-4 text-indigo-500"></i> الملفات المرفقة</div><ul class="text-xs text-gray-600 space-y-1"><li class="flex items-center gap-2"><i data-lucide="check" class="w-3 h-3 text-green-500"></i> دراسة الجدوى</li><li class="flex items-center gap-2"><i data-lucide="check" class="w-3 h-3 text-green-500"></i> القوائم المالية المدققة</li><li class="flex items-center gap-2"><i data-lucide="check" class="w-3 h-3 text-green-500"></i> صافي الثروة</li></ul></div>
                    <div class="border border-gray-100 rounded-lg p-4"><div class="text-xs font-bold text-[#002d5d] mb-2 flex items-center gap-2"><i data-lucide="alert-triangle" class="w-4 h-4 text-orange-500"></i> النواقص</div>${o.phase < 3 || o.risk === 'high' ? `<div class="text-xs text-orange-700 flex items-center justify-between bg-orange-50 rounded p-2 mb-1"><span>تحديث جدول التدفقات النقدية</span><span class="text-[10px] font-bold">باقي 3 أيام</span></div><div class="text-xs text-orange-700 flex items-center justify-between bg-orange-50 rounded p-2"><span>القوائم المالية لسنة 2023</span><span class="text-[10px] font-bold">باقي 5 أيام</span></div>` : '<div class="text-xs text-gray-400 italic text-center py-2">لا توجد نواقص</div>'}</div>
                </div>
                <div class="flex justify-between items-center pt-3 border-t border-gray-100"><button onclick="closeProjectModal()" class="bg-white border border-gray-200 text-gray-600 px-5 py-2 rounded-lg text-xs font-bold hover:bg-gray-50">إغلاق</button></div>`;
            document.getElementById('project-modal').classList.remove('hidden');
            lucide.createIcons();
        }
        function closeProjectModal() { document.getElementById('project-modal').classList.add('hidden'); }
        document.getElementById('project-modal').addEventListener('click', function(e) { if (e.target === this) closeProjectModal(); });

        const fileTypes = [
            { id: 'MRD', name: 'MRD', label: 'تقرير دراسة السوق', icon: 'bar-chart-3', cls: 'file-mrd' },
            { id: 'FTR', name: 'FTR', label: 'تقرير الدراسة الفنية', icon: 'settings-2', cls: 'file-ftr' },
            { id: 'FMR', name: 'FMR', label: 'تقرير المخاطر المالية', icon: 'shield-alert', cls: 'file-fmr' },
            { id: 'OWN', name: 'Ownership',  label: 'تقرير الملكية', icon: 'user-check', cls: 'file-own' },
            { id: 'PER', name: 'PER',        label: 'تقرير تقييم الأداء', icon: 'gauge', cls: 'file-per' },
            { id: 'RSK', name: 'Risk',       label: 'تقييم المخاطر', icon: 'alert-octagon', cls: 'file-rsk' },
            { id: 'CRM', name: 'CRM',        label: 'نموذج المخاطر الائتمانية', icon: 'line-chart', cls: 'file-crm' }
        ];

        // Pre-populated groups (assigned by admin)
        const groups = [
            { id: 'g-1', name: 'مجموعة 1', employees: ['ناصر الراجحي', 'سارة خالد', 'ريم عبدالله'], projects: ['RQ-2024-321'], files: [] },
            { id: 'g-2', name: 'مجموعة 2', employees: ['أحمد علي', 'فهد منصور'], projects: ['RQ-2024-772'], files: [] },
            { id: 'g-3', name: 'مجموعة 3', employees: ['خالد العمري', 'سارة خالد'], projects: ['RQ-2024-901'], files: [] },
            { id: 'g-4', name: 'مجموعة 4', employees: ['ناصر الراجحي', 'ريم عبدالله'], projects: [], files: [] }
        ];

        let dragged = null;

        function renderOrders() {
            const pool = document.getElementById('orders-pool');
            document.getElementById('orders-count').textContent = orders.length;
            pool.innerHTML = '';
            orders.forEach(o => {
                const c = document.createElement('div');
                c.className = 'order-card bg-white border-2 border-gray-200 rounded-lg p-2.5 shadow-sm hover:shadow-md';
                c.draggable = true;
                c.dataset.kind = 'order';
                c.dataset.id = o.id;
                c.dataset.name = o.name;
                c.innerHTML = `
                    <div class="flex items-start justify-between mb-1">
                        <div class="bg-orange-50 p-1.5 rounded-md"><i data-lucide="briefcase" class="w-3.5 h-3.5 text-orange-600"></i></div>
                        <i data-lucide="move" class="w-3 h-3 text-gray-300"></i>
                    </div>
                    <h4 class="text-[#002d5d] font-bold text-[11px] mb-0.5">${o.id}</h4>
                    <p class="text-[9px] text-gray-500 leading-snug truncate">${o.name}</p>
                `;
                c.addEventListener('dragstart', onDragStart);
                c.addEventListener('dragend', onDragEnd);
                c.addEventListener('click', () => openProjectModal(o.id));
                c.style.cursor = 'pointer';
                pool.appendChild(c);
            });
            lucide.createIcons();
        }

        function renderFiles() {
            const pool = document.getElementById('files-pool');
            pool.innerHTML = '';
            fileTypes.forEach(f => {
                const c = document.createElement('div');
                c.className = `file-card border-2 ${f.cls} rounded-lg p-3 shadow-sm hover:shadow-md`;
                c.draggable = true;
                c.dataset.kind = 'file';
                c.dataset.id = f.id;
                c.dataset.label = f.label;
                c.innerHTML = `
                    <div class="flex items-center justify-between mb-1.5">
                        <div class="flex items-center gap-2">
                            <i data-lucide="${f.icon}" class="w-4 h-4"></i>
                            <span class="font-bold text-xs">${f.name}</span>
                        </div>
                        <i data-lucide="move" class="w-3 h-3 opacity-50"></i>
                    </div>
                    <p class="text-[10px] opacity-80 leading-snug">${f.label}</p>
                `;
                c.addEventListener('dragstart', onDragStart);
                c.addEventListener('dragend', onDragEnd);
                pool.appendChild(c);
            });
            lucide.createIcons();
        }

        function renderGroups() {
            const wrap = document.getElementById('groups-container');
            document.getElementById('groups-count').textContent = groups.length;
            wrap.innerHTML = '';
            groups.forEach(g => {
                const card = document.createElement('div');
                card.className = 'group-zone border-2 border-purple-200 bg-purple-50/20 rounded-xl p-3';
                card.dataset.groupId = g.id;
                const load = Math.min(g.projects.length * 3, 10);
                const loadPercent = (load / 10) * 100;
                const loadColor = load === 0 ? 'bg-gray-300' : load <= 4 ? 'bg-green-500' : load <= 7 ? 'bg-orange-500' : 'bg-red-500';
                const loadTextColor = load === 0 ? 'text-gray-400' : load <= 4 ? 'text-green-600' : load <= 7 ? 'text-orange-600' : 'text-red-600';
                card.innerHTML = `
                    <div class="flex items-center justify-between mb-2 pb-2 border-b border-purple-200">
                        <div class="flex items-center gap-2">
                            <div class="bg-purple-500 p-1 rounded"><i data-lucide="users-round" class="w-3.5 h-3.5 text-white"></i></div>
                            <h4 class="text-xs font-bold text-[#002d5d]">${g.name}</h4>
                        </div>
                        <span class="text-[9px] text-gray-400">${g.employees.length}م · ${g.projects.length}ط · ${g.files.length}ملف</span>
                    </div>

                    <div class="mb-2">
                        <div class="flex items-center justify-between text-[9px] mb-1">
                            <span class="text-gray-500 font-bold">الحمل</span>
                            <span class="font-bold ${loadTextColor}">${load}/10</span>
                        </div>
                        <div class="w-full bg-gray-200 h-1.5 rounded-full overflow-hidden">
                            <div class="${loadColor} h-full rounded-full transition-all" style="width:${loadPercent}%"></div>
                        </div>
                    </div>

                    <div class="mb-2">
                        <div class="text-[9px] text-gray-500 font-bold mb-1">الموظفون</div>
                        <div class="flex flex-wrap gap-1">
                            ${g.employees.map(e => `<span class="inline-flex items-center gap-1 px-1.5 py-0.5 bg-purple-100 text-purple-700 rounded-full text-[9px] font-bold"><i data-lucide="user" class="w-2.5 h-2.5"></i>${e}</span>`).join('')}
                        </div>
                    </div>

                    <div class="mb-2">
                        <div class="text-[9px] text-gray-500 font-bold mb-1">الطلبات</div>
                        <div class="flex flex-wrap gap-1">
                            ${g.projects.map(p => `<span onclick="event.stopPropagation();openProjectModal('${p}')" class="cursor-pointer inline-flex items-center gap-1 px-1.5 py-0.5 bg-orange-100 hover:bg-orange-200 text-orange-700 rounded-full text-[9px] font-bold transition-all"><i data-lucide="briefcase" class="w-2.5 h-2.5"></i>${p}</span>`).join('')}
                        </div>
                    </div>

                    <div>
                        <div class="text-[9px] text-gray-500 font-bold mb-1">الملفات المطلوبة</div>
                        <div class="min-h-[40px] border-2 border-dashed border-indigo-200 rounded p-1.5 bg-white flex flex-wrap gap-1 items-start">
                            ${g.files.length > 0
                                ? g.files.map(f => {
                                    const ft = fileTypes.find(x => x.id === f);
                                    return `<span class="inline-flex items-center gap-1 px-2 py-0.5 ${ft.cls} border rounded-full text-[9px] font-bold">
                                        <i data-lucide="${ft.icon}" class="w-2.5 h-2.5"></i>${ft.name}
                                        <button onclick="removeFile('${g.id}','${f}')" class="opacity-60 hover:opacity-100 mr-0.5"><i data-lucide="x" class="w-2.5 h-2.5"></i></button>
                                    </span>`;
                                }).join('')
                                : '<span class="text-[9px] text-gray-300 italic self-center mx-auto">اسحب ملف هنا</span>'
                            }
                        </div>
                    </div>
                `;
                card.addEventListener('dragover', onDragOver);
                card.addEventListener('dragleave', onDragLeave);
                card.addEventListener('drop', onDrop);
                wrap.appendChild(card);
            });
            lucide.createIcons();
        }

        function onDragStart(e) {
            dragged = { kind: this.dataset.kind, id: this.dataset.id, name: this.dataset.name || this.dataset.label };
            this.classList.add('dragging');
        }
        function onDragEnd(e) { this.classList.remove('dragging'); }
        function onDragOver(e) { e.preventDefault(); this.classList.add('drag-over'); }
        function onDragLeave(e) { this.classList.remove('drag-over'); }

        function onDrop(e) {
            e.preventDefault();
            this.classList.remove('drag-over');
            if (!dragged) return;
            const g = groups.find(x => x.id === this.dataset.groupId);
            if (!g) return;

            if (dragged.kind === 'file') {
                if (g.files.includes(dragged.id)) {
                    toast(`الملف ${dragged.id} موجود مسبقاً في ${g.name}`, 'warning');
                } else {
                    g.files.push(dragged.id);
                    toast(`تم تعيين ${dragged.id} إلى ${g.name}`, 'success');
                    renderGroups();
                }
            } else if (dragged.kind === 'order') {
                if (g.projects.includes(dragged.id)) {
                    toast(`الطلب ${dragged.id} موجود مسبقاً في ${g.name}`, 'warning');
                } else if (g.projects.length >= 1) {
                    toast(`${g.name} مكتملة - لا يمكن إضافة أكثر من طلب واحد`, 'warning');
                } else {
                    g.projects.push(dragged.id);
                    toast(`تم إضافة ${dragged.id} إلى ${g.name}`, 'success');
                    renderGroups();
                }
            }
            dragged = null;
        }

        function removeFile(groupId, fileId) {
            const g = groups.find(x => x.id === groupId);
            if (g) g.files = g.files.filter(f => f !== fileId);
            renderGroups();
        }

        function toast(message, type = 'info') {
            const colors = { info: 'bg-blue-500', success: 'bg-green-500', warning: 'bg-orange-500' };
            const t = document.createElement('div');
            t.className = `fixed bottom-6 left-1/2 transform -translate-x-1/2 ${colors[type]} text-white px-6 py-3 rounded-lg shadow-lg text-sm font-bold flex items-center gap-2 z-50`;
            t.innerHTML = `<i data-lucide="${type === 'success' ? 'check-circle' : 'info'}" class="w-4 h-4"></i><span>${message}</span>`;
            document.body.appendChild(t);
            lucide.createIcons();
            setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 2500);
        }

        renderOrders();
        renderFiles();
        renderGroups();
    </script>
</body>
</html>
